openapi: 3.0.3
info:
  title: DocForge API
  description: |
    Microservicio NestJS de generación de documentos PDF financieros con PdfKit y enlaces cifrados AES.

    ## Flujo General
    1. Enviar un POST con `templateId` y `documentData` a `/api/generate/pdf` o `/api/generate/link`
    2. El servicio convierte `amount` a texto en español (función local), genera el PDF con PdfKit y lo almacena temporalmente en disco
    3. El PDF se retorna como descarga directa o como un enlace temporal cifrado con AES

    ## Templates Disponibles
    | ID | Tipo | Familia |
    |---|---|---|
    | `t0000002198` | Cuenta de cobro | Legacy |
    | `t0000002199` | Recibo de pago | Legacy |
    | `t0000002000` | Constancia | Legacy |
    | `t0000003000` | Voucher de producción | Ordamy |
    | `t0000003001` | Cuenta de cobro | Ordamy |
    | `t0000003002` | Corte diario | Ordamy |
    | `t0000003003` | Corte mensual | Ordamy |

    ## Notas Importantes
    - El campo `amount` en `documentData` es **obligatorio para todos los templates**, incluso si el template no lo muestra
    - El servicio elimina los separadores de miles (puntos) de `amount` con regex `/\./g` antes de convertir a letras
    - No hay autenticación. El servicio está diseñado para consumo interno
  version: 0.0.1
  contact:
    name: Core Team
    email: lead@bigso.co

servers:
  - url: http://localhost:3000
    description: Desarrollo local (bigso.local)
  - url: https://viewer.bigso.co
    description: Producción y QA (bigso.prod, bigso.qa)

tags:
  - name: Health
    description: Verificación del estado del servicio
  - name: PDF Generation
    description: Generación de documentos PDF
  - name: PDF Download
    description: Descarga de PDFs generados vía enlace cifrado

paths:
  /:
    get:
      tags:
        - Health
      summary: Health check
      description: Verifica que el servicio está activo. Retorna texto plano.
      operationId: healthCheck
      responses:
        '200':
          description: Servicio activo
          content:
            text/plain:
              schema:
                type: string
                example: Hello World!

  /api/generate/pdf:
    post:
      tags:
        - PDF Generation
      summary: Generar PDF — descarga directa
      description: |
        Genera un documento PDF a partir de un template y datos proporcionados, y lo retorna
