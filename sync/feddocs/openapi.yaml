  /api/generate/link:
    post:
      tags:
        - PDF Generation
      summary: Generar PDF — enlace temporal cifrado
      description: |
        Genera el PDF en disco y retorna un enlace temporal cifrado con AES para descargarlo
        posteriormente. El archivo se elimina automáticamente del disco tras el tiempo
        especificado en `docTimeOut`.

        El valor por defecto de `docTimeOut` es **200000 ms** (200 segundos ≈ 3.3 minutos).
      operationId: generatePdfLink
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDocumentDTO'
            example:
              templateId: t0000002199
              docTimeOut: 300000
              documentData:
                documentId: RP-2026-0042
                date: 05 de marzo de 2026
                client:
                  name: María García
                  docType: CC
                  docNumber: '52.987.654'
                creditor:
                  name: Tech Solutions LTDA
                  docType: NIT
                  docNumber: '800.456.789-1'
                amount: '750000'
                items:
                  - description: Pago mensualidad servicio cloud — marzo 2026
                signature: x9y8z7w6
      responses:
        '200':
          description: Enlace temporal generado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LinkResponse'
        '400':
          description: Error de validación o generación
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
            text/plain:
              schema:
                type: string

  /api/generate/download/{path}:
    get:
      tags:
        - PDF Download
      summary: Descargar PDF por enlace cifrado
      description: |
        Descarga un PDF previamente generado usando el enlace cifrado obtenido del endpoint
        `POST /api/generate/link`. El parámetro `path` es el valor de `pathFile` retornado.
      operationId: downloadPdf
      parameters:
        - name: path
          in: path
          required: true
          description: Ruta cifrada del archivo PDF (valor de `pathFile` del endpoint `/api/generate/link`)
          schema:
            type: string
          example: U2FsdGVkX1+abc123encryptedPathBase64==
      responses:
        '200':
          description: PDF descargado exitosamente
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '400':
          description: Error de descifrado
          content:
            text/plain:
              schema:
                type: string
              example: Error de descifrado de crypto-js
        '404':
          description: Archivo no encontrado (expirado o inexistente)
          content:
            text/plain:
              schema:
                type: string
              example: File Not Found

components:
  schemas:
    CreateDocumentDTO:
      type: object
      required:
        - templateId
        - documentData
      properties:
        templateId:
          type: string
          description: |
            ID del template a utilizar. Debe coincidir exactamente con uno de los templates registrados.
          enum:
            - t0000002198
            - t0000002199
            - t0000002000
            - t0000003000
            - t0000003001
            - t0000003002
            - t0000003003
          example: t0000003001
        docTimeOut:
          type: number
          description: |
            Tiempo de vida del archivo en milisegundos. Solo aplica para el endpoint `/api/generate/link`.
            Default: 200000 (200 segundos). Se ignora en `/api/generate/pdf`.
          example: 300000
        documentData:
          type: object
          description: |
            Objeto con los datos del documento. La estructura interna depende del template.
            El campo `amount` (string) es **obligatorio para todos los templates** porque el servicio
            lo procesa para generar `amountInLetters` antes de invocar cualquier template.
          required:
            - amount
            - signature
          properties:
            amount:
              type: string
              description: |
                Monto numérico como string. Puede incluir separadores de miles con punto (ej: "1.500.000").
                El servicio elimina todos los puntos con regex antes de convertir a número.
              example: '25000'
            signature:
              type: string
              description: Cadena de seguridad que se muestra en cada página del PDF
              example: abc123
          additionalProperties: true

    LinkResponse:
      type: object
      properties:
        pathFile:
          type: string
          description: Ruta del archivo PDF cifrada con AES y codificada en Base64. Se usa como parámetro `:path` para el endpoint de descarga.
          example: U2FsdGVkX1+abc123encryptedPathBase64==
        documentLife:
          type: string
          description: Tiempo de vida del archivo en milisegundos seguido de "ms"
          example: 300000ms

    ValidationError:
      type: object
      properties:
        statusCode:
          type: integer
          example: 400
        message:
          type: array
          items:
            type: string
          example:
            - templateId should not be empty
            - templateId must be a string
            - documentData should not be an empty object
            - documentData must be an object
        error:
          type: string
          example: Bad Request
